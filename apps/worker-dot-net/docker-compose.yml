services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: serviceworker-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - serviceworker

  postgres:
    image: postgres:16-alpine
    container_name: serviceworker-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: serviceworker_user
      POSTGRES_PASSWORD: serviceworker_password
      POSTGRES_DB: serviceworker_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serviceworker_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - serviceworker

volumes:
  rabbitmq_data:
  postgres_data:

networks:
  serviceworker:
    driver: bridge
