version: '3.9'

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: service-worker-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - service-worker

  postgres:
    image: postgres:16-alpine
    container_name: service-worker-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: service_worker_user
      POSTGRES_PASSWORD: service_worker_password
      POSTGRES_DB: service_worker_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_worker_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - service-worker

volumes:
  rabbitmq_data:
  postgres_data:

networks:
  derme-plan:
    driver: bridge
